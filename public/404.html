<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tilawah</title>
    <!--
      Single-Page-App redirect for GitHub Pages (rafgraph/spa-github-pages).
      Pages serves this file for any unknown path; we encode that path into a
      query string and bounce to index.html, where it is decoded back into a
      real route before React boots. pathSegmentsToKeep = 1 keeps the
      /dailyTilawah/ project-page prefix.
    -->
    <script>
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
